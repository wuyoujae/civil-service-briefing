name: Daily news brief

on:
  schedule:
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate today's brief
        env:
          BRIEF_OUTPUT_DIR: ${{ github.workspace }}/archive
        run: python scripts/generate_morning_brief.py
      - name: Rebuild directory page
        run: python scripts/build_index.py
      - name: Commit updated archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive data index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update morning brief $(date -u +%F)"
            git push
          fi
